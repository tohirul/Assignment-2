<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Fooball</title>

    <!---------------
        Icon Kit
    ----------------->
    <script src="https://kit.fontawesome.com/de0f1b4265.js" crossorigin="anonymous"></script>

    <!---------------
        Font Family 
    ---------------->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">


    <!---------
     Stylesheet
     ---------->

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/nav.css">

</head>

<body>

    <!-----------------
        Header Start
    ------------------>
    <header>

        <!------------------
            Navigation Bar
        ------------------->
        <nav>

            <div class="menu">

                <a href="">Home</a>
                <a href="">Clubs</a>
                <a href="">World Cup 2023</a>
                <a href="">Upcoming Matches</a>
                <a href="">Contact</a>

            </div>

            <div class="user">

                <div class="nav-button">

                    <a class="login" href=""><i class="fas fa-sign-in-alt"></i>Log in</a>

                </div>

            </div>

        </nav>

        <!-----------------------
            Navigation Bar End 
        ------------------------->


        <section class="top-section">

            <!----------
            Heading
         ----------->

            <div class="top-heading">

                <div class="heading">

                    <p>
                        Conmebol Copa America 2021
                    <p>

                    <div class="Button">

                        <a class="watch-live" href="#">Watch Live</a>
                        <i class="fas fa-arrow-right"></i>

                    </div>

                </div>


            </div>

            <div class="header-thumbnail">

                <img src="images/banner.png" alt="">

            </div>

        </section>

    </header>
    <!---------------
        Header End
    ----------------->

    <!---------
         Main
    ---------->
    <main>

        <section class="Player-Grid">

            <div class="top-players">

                <div class="Grid-Cells">

                    <div class="players Gradient-Border Shadow-Box">

                        <div class="player-img">

                            <img src="images/players/player-1.png" alt="">

                        </div>

                        <div class="player-details">

                            <h3> Lionel Messi </h3>
                            <p>Lionel Andrés Messi is an Argentine professional footballer who plays
                                as a forward or an attacking midfielder.
                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
